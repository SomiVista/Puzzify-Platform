name: Auto PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate and Update PR Body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          
          git fetch origin $TARGET_BRANCH
          
          COMMITS=$(git log origin/$TARGET_BRANCH..HEAD --oneline --pretty=format:"- %s")
          DIFF=$(git diff origin/$TARGET_BRANCH..HEAD | head -c 100000)
          
          export COMMITS
          export DIFF
          
          python3 -c "
          import os, json, urllib.request
          
          commits = os.environ.get('COMMITS', '')
          diff = os.environ.get('DIFF', '')
          
          prompt = f'''You are an expert software engineer. Write a professional and comprehensive Pull Request description based on the provided commit messages and code diff.
          
          Focus on:
          1. What changed
          2. Why it changed
          3. A brief summary of the technical implementation
          
          Commit Messages:
          {commits}
          
          Code Diff:
          {diff}
          
          Output ONLY the markdown description without any preamble or extra conversational text.
          '''
          
          api_key = os.environ.get('GEMINI_API_KEY')
          if not api_key:
              print('Error: GEMINI_API_KEY is not set')
              exit(1)
              
          model = os.environ.get('GEMINI_MODEL') or 'gemini-1.5-flash'
          url = f'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}'
          
          data = {
              'contents': [{'parts': [{'text': prompt}]}],
              'generationConfig': {'temperature': 0.2}
          }
          
          req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  result = json.loads(response.read().decode('utf-8'))
                  text = result['candidates'][0]['content']['parts'][0]['text']
                  with open('pr_body.md', 'w') as f:
                      f.write('## 🚀 Automated Change Log (Gemini AI)\\n\\n')
                      f.write(text.strip())
                      f.write('\\n\\n---\\n*Generated automatically by Puzzify CI/CD Pipeline & Gemini AI 🤖✨*')
          except Exception as e:
              print(f'Error calling Gemini API: {e}')
              if hasattr(e, 'read'):
                  print(e.read().decode('utf-8'))
              exit(1)
          "
          
          gh pr edit ${{ github.event.pull_request.number }} --body-file pr_body.md