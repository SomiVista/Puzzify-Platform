name: Release

# Every merge/push to main automatically bumps the patch version, commits the
# bump back to main, and publishes a matching GitHub Release with generated
# notes. No manual version bump is ever required.
#
# The bump commit is made with the repo GITHUB_TOKEN, so it does NOT trigger
# another workflow run (GitHub suppresses recursive runs for GITHUB_TOKEN), and
# it carries [skip ci] as an extra safeguard against loops.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Auto version & publish release
    # Skip the run triggered by our own version-bump commit.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        id: bump
        run: |
          # npm version prints the new tag (e.g. v1.2.3) and updates
          # package.json + package-lock.json without creating a git tag itself.
          TAG=$(npm version patch --no-git-tag-version)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git push

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
