name: CI/CD

# Runs the full pipeline on every PR to main (validation only) and on every
# merge/push to main (validation + deploy to Firebase Hosting).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs only for pushes (e.g. to main); let every PR run
# finish so a superseded run never shows up as a confusing failed check.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate: lint -> unit tests -> E2E -> build. Runs for PRs and pushes.
  # ---------------------------------------------------------------------------
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm run test

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build project
        run: npm run build

  # ---------------------------------------------------------------------------
  # 2. Version check: on PRs, fail unless package.json version was bumped above
  #    the version currently on the base branch (semver greater-than).
  # ---------------------------------------------------------------------------
  version-check:
    name: Version bump check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure package.json version was bumped
        run: |
          NEW=$(node -p "require('./package.json').version")
          git fetch origin "${{ github.base_ref }}" --depth=1
          # On the first PR that introduces package.json, there is nothing to
          # compare against on the base branch — skip the gate in that case.
          if ! OLD_JSON=$(git show "origin/${{ github.base_ref }}:package.json" 2>/dev/null); then
            echo "package.json does not exist on ${{ github.base_ref }} yet — skipping version comparison."
            exit 0
          fi
          OLD=$(printf '%s' "$OLD_JSON" \
            | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          echo "Base version: $OLD | PR version: $NEW"
          if [ "$NEW" = "$OLD" ]; then
            echo "::error::package.json version ($NEW) is unchanged. Bump the semver before merging to main."
            exit 1
          fi
          if [ -z "$(npx --yes semver -r \">$OLD\" \"$NEW\")" ]; then
            echo "::error::package.json version ($NEW) is not greater than base ($OLD)."
            exit 1
          fi
          echo "Version bump OK: $OLD -> $NEW"

  # ---------------------------------------------------------------------------
  # 3a. Deploy (dev): on PRs, ship the build to a persistent Firebase preview
  #     channel and record it under the GitHub "dev" environment.
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev (preview channel)
    needs: validate
    # Skip on forked PRs — the Firebase service-account secret is not exposed
    # to forks, so the deploy would fail.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting (dev preview channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUZZIFY_PLATFORM }}'
          channelId: dev
          projectId: puzzify-platform

  # ---------------------------------------------------------------------------
  # 3b. Deploy (prod): only on merge/push to main, after validation passes.
  #     Recorded under the GitHub "prod" environment.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to prod (live)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://puzzify-platform.web.app
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUZZIFY_PLATFORM }}'
          channelId: live
          projectId: puzzify-platform
